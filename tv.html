<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TV Display - Dulcedia 2026</title>
    <style>
        body { margin: 0; background: #0f172a; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; color: white; }
        
        #welcome-screen { position: absolute; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); }
        .logo-container { text-align: center; margin-bottom: 50px; }
        .sidra-logo { font-size: 28px; color: #fbbf24; letter-spacing: 4px; font-weight: bold; margin-bottom: 10px; }
        .fest-title { font-size: 75px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 30px rgba(233,30,99,0.3); margin: 0; color: #fff; }
        
        .progress-container { width: 60vw; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 50px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); position: relative; }
        .progress-bar { width: 0%; height: 35px; background: linear-gradient(90deg, #ec4899, #8b5cf6, #3b82f6); border-radius: 40px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 20px rgba(139, 92, 246, 0.6); }
        .percentage { font-size: 32px; font-weight: bold; margin-top: 20px; color: #38bdf8; }
        
        /* പുതിയ ട്രാൻസിഷൻ സ്ക്രീൻ (Launching...) */
        #transition-screen { position: absolute; width: 100vw; height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3; background: #0f172a; text-align: center; }
        .mining-text { color: #94a3b8; font-size: 40px; margin: 0; font-weight: 600; letter-spacing: 2px; }
        .dulce-text { color: #fff; font-size: 80px; margin: 10px 0; font-weight: 900; }
        .launching-text { color: #fbbf24; font-size: 35px; margin-top: 30px; font-weight: bold; }
        
        /* 3 ഡോട്ടുകൾക്കുള്ള ആനിമേഷൻ */
        .dots::after { content: ''; animation: loadingDots 1.5s infinite steps(4, end); }
        @keyframes loadingDots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } 100% { content: ''; } }

        #final-poster { position: absolute; width: 100vw; height: 100vh; object-fit: cover; z-index: 4; display: none; }
        
        /* വലിപ്പം കുറച്ച പുതിയ പേരുകളുടെ ഡിസൈൻ */
        .floating-name { 
            position: absolute; bottom: -80px; color: #fff; 
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.9), rgba(239, 68, 68, 0.9)); 
            padding: 10px 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: floatUpSlow 5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; z-index: 5; 
            display: flex; flex-direction: column; align-items: center; text-align: center; line-height: 1.3;
        }
        .love-text { font-size: 16px; font-weight: 600; color: #fef3c7; }
        .person-name { font-size: 24px; font-weight: 900; text-shadow: 1px 2px 4px rgba(0,0,0,0.5); }

        @keyframes floatUpSlow { 
            0% { transform: translateY(0) scale(0.6); opacity: 0; } 
            10% { opacity: 1; transform: translateY(-15vh) scale(1); }
            85% { opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.1); opacity: 0; } 
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<img id="final-poster" src="poster-tv.jpg" alt="Dulce Dia Poster">

<div id="transition-screen">
    <h2 class="mining-text">Mining the Minds</h2>
    <h1 class="dulce-text">Dulce Dia 2026</h1>
    <h3 class="launching-text">Launching<span class="dots"></span></h3>
</div>

<div id="welcome-screen">
    <div class="logo-container">
        <div class="sidra-logo">SIDRA ACADEMY</div>
        <h1 class="fest-title">DULCE DIA 2026</h1>
    </div>
    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>
    <div class="percentage" id="percent-text">0% Launched</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://dulcedia-2026-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isLaunched = false;

    db.ref('click_count').on('value', (snapshot) => {
        let clicks = snapshot.val() || 0;
        if(clicks > 200) clicks = 200; 
        
        let percent = Math.floor((clicks / 200) * 100);
        
        document.getElementById('bar').style.width = percent + '%';
        document.getElementById('percent-text').innerText = percent + '% Launched';
        
        // 100% ആകുമ്പോൾ ട്രാൻസിഷൻ വരുന്നു
        if(percent >= 100 && !isLaunched) {
            isLaunched = true;
            setTimeout(() => {
                // വെൽക്കം സ്ക്രീൻ മാറ്റി Launching സ്ക്രീൻ കാണിക്കുന്നു
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('transition-screen').style.display = 'flex';
                
                // 4 സെക്കൻഡ് കാത്തിരുന്ന ശേഷം പോസ്റ്റർ കാണിക്കുന്നു
                setTimeout(() => {
                    document.getElementById('transition-screen').style.display = 'none';
                    document.getElementById('final-poster').style.display = 'block';
                }, 4000); 

            }, 500);
        }
    });

    db.ref('recent_scratch').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data && (Date.now() - data.time < 10000)) {
            showFloatingName(data.name);
        }
    });

    function showFloatingName(name) {
        let el = document.createElement('div');
        el.className = 'floating-name';
        // രണ്ടു വരിയിലായി പുതിയ ഡിസൈൻ
        el.innerHTML = "<span class='love-text'>I ❤️ Dulce Dia✨</span><span class='person-name'>" + name + "</span>";
        el.style.left = Math.random() * 70 + 10 + 'vw'; // സ്ക്രീനിൽ പല ഭാഗത്തായി വരാൻ
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5000); 
    }
</script>
</body>
</html>
