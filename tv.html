<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TV Display - Dulcedia 2026</title>
    <style>
        body { margin: 0; background: #0f172a; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; color: white; }
        
        /* വെൽക്കം ഇന്റർഫേസ് സ്റ്റൈൽ */
        #welcome-screen { position: absolute; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); }
        .logo-container { text-align: center; margin-bottom: 50px; }
        .sidra-logo { font-size: 28px; color: #fbbf24; letter-spacing: 4px; font-weight: bold; margin-bottom: 10px; }
        .fest-title { font-size: 75px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 30px rgba(233,30,99,0.3); margin: 0; color: #fff; }
        
        /* ലോഡിങ് ബാർ ഡിസൈൻ */
        .progress-container { width: 60vw; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 50px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); position: relative; }
        .progress-bar { width: 0%; height: 35px; background: linear-gradient(90deg, #ec4899, #8b5cf6, #3b82f6); border-radius: 40px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 20px rgba(139, 92, 246, 0.6); }
        .percentage { font-size: 32px; font-weight: bold; margin-top: 20px; color: #38bdf8; }
        
        /* ഫൈനൽ ലാൻഡ്സ്കേപ്പ് പോസ്റ്റർ */
        #final-poster { position: absolute; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; display: none; }
        
        /* പേര് ഫ്ലോട്ട് ചെയ്യുന്ന സമയം 5 സെക്കൻഡ് ആക്കി കൂട്ടി */
        .floating-name { 
            position: absolute; bottom: -80px; color: #fff; font-size: 45px; font-weight: bold; 
            text-shadow: 2px 4px 10px rgba(0,0,0,0.9); background: linear-gradient(135deg, #f59e0b, #ef4444); 
            padding: 15px 35px; border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            animation: floatUpSlow 5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; z-index: 5; 
            display: flex; align-items: center; gap: 15px; 
        }
        @keyframes floatUpSlow { 
            0% { transform: translateY(0) scale(0.6); opacity: 0; } 
            10% { opacity: 1; transform: translateY(-15vh) scale(1.1); }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.4); opacity: 0; } 
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<img id="final-poster" src="https://i.postimg.cc/QCCK81LM/Untitled-1.jpg" alt="Dulce Dia Poster">

<div id="welcome-screen">
    <div class="logo-container">
        <div class="sidra-logo">SIDRA ACADEMY</div>
        <h1 class="fest-title">DULCE DIA 2026</h1>
    </div>
    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>
    <div class="percentage" id="percent-text">0% Launched</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://dulcedia-2026-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ലൈവ് ക്ലിക്ക് കൗണ്ട് നിരീക്ഷിക്കുന്നു
    db.ref('click_count').on('value', (snapshot) => {
        let clicks = snapshot.val() || 0;
        if(clicks > 200) clicks = 200; // മാക്സിമം 200 ക്ലിക്ക്
        
        let percent = Math.floor((clicks / 200) * 100);
        
        document.getElementById('bar').style.width = percent + '%';
        document.getElementById('percent-text').innerText = percent + '% Launched (' + clicks + '/200 Taps)';
        
        // 100% ആയാൽ സർപ്രൈസ് പോസ്റ്റർ വരുന്നു
        if(percent >= 100) {
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('final-poster').style.display = 'block';
            }, 1000);
        }
    });

    // പുതിയ പേര് വരുമ്പോൾ ഫ്ലോട്ട് ചെയ്യിക്കുന്നു
    db.ref('recent_scratch').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data && (Date.now() - data.time < 10000)) { // പഴയ പേരുകൾ വരാതിരിക്കാൻ
            showFloatingName(data.name);
        }
    });

    function showFloatingName(name) {
        let el = document.createElement('div');
        el.className = 'floating-name';
        el.innerHTML = "<span>📢</span> <span>" + name + "</span> <span>🔥</span>";
        el.style.left = Math.random() * 60 + 15 + 'vw'; 
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5000); 
    }
</script>
</body>
</html>
