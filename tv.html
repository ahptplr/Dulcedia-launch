<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Display - Dulcedia 2026</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #0f172a; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            text-align: center;
        }
        .container { width: 90%; max-width: 900px; position: relative; z-index: 10; }
        .subtitle { color: #f59e0b; letter-spacing: 3px; font-weight: bold; font-size: 24px; margin-bottom: 10px; }
        .title { font-size: 72px; font-weight: 800; margin: 0 0 40px 0; letter-spacing: 2px; }
        
        /* പ്രോഗ്രസ് ബാർ സ്റ്റൈൽ */
        .progress-container { 
            width: 100%; height: 35px; background: rgba(51, 65, 85, 0.5); 
            border-radius: 20px; overflow: hidden; margin-bottom: 25px;
            border: 2px solid #334155; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .progress-bar { 
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, #ec4899, #3b82f6); 
            transition: width 0.4s ease; border-radius: 20px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
        }
        .percentage-text { font-size: 32px; color: #38bdf8; font-weight: bold; margin-top: 15px; }

        /* രണ്ട് വരികളുള്ള പുതിയ പോപ്പപ്പ് ബാഡ്ജ് സ്റ്റൈൽ */
        .badge {
            position: absolute; 
            padding: 15px 35px; 
            border-radius: 25px; /* രണ്ട് വരികൾക്ക് അനുയോജ്യമായ ബോക്സ് ഷേപ്പ് */
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: floatUp 3.5s forwards ease-out; 
            opacity: 0; 
            pointer-events: none;
            border: 2px solid rgba(255,255,255,0.2);
            text-align: center;
            min-width: 250px;
        }
        /* ആദ്യ വരിയിലെ പേര് (വലുതും ബോൾഡും) */
        .badge-name {
            font-size: 34px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        /* രണ്ടാമത്തെ വരിയിലെ മെസ്സേജ് (ചെറിയ അക്ഷരത്തിൽ മഞ്ഞ നിറത്തിൽ) */
        .badge-msg {
            font-size: 22px;
            font-weight: 600;
            color: #fef08a; /* ആകർഷകമായ ലൈറ്റ് ഗോൾഡ്/മഞ്ഞ ഷേഡ് */
            letter-spacing: 0.5px;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.6); opacity: 0; }
            10% { opacity: 1; transform: translateY(75vh) scale(1); }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(0.8); opacity: 0; }
        }
        
        #launch-screen { display: block; }
        #result-screen { display: none; }
        .poster-tv { max-height: 85vh; max-width: 100%; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div class="container" id="launch-screen">
    <div class="subtitle">SIDRA ACADEMY</div>
    <div class="title">DULCE DIA 2026</div>
    
    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>
    <div class="percentage-text" id="percentage-label">Preparing for Launch... 0%</div>
</div>

<div class="container" id="result-screen">
    <img src="poster-tv.jpg" class="poster-tv" alt="Official Launch Poster">
</div>

<script>
    const firebaseConfig = { databaseURL: "https://dulcedia-2026-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const targetClicks = 200;

    // 1. പ്രോഗ്രസ് ബാറും ശതമാനവും മാത്രം കാണിക്കുന്നു (ടാപ്സിന്റെ എണ്ണം ഒഴിവാക്കി)
    db.ref('click_count').on('value', (snapshot) => {
        const clicks = snapshot.val() || 0;
        let percentage = Math.floor((clicks / targetClicks) * 100);
        if(percentage > 100) percentage = 100;

        document.getElementById('bar').style.width = percentage + '%';
        document.getElementById('percentage-label').innerText = `Preparing for Launch... ${percentage}%`;

        // 100% ആയാൽ പോസ്റ്റർ സ്ക്രീൻ ലോഡ് ചെയ്യും
        if(clicks >= targetClicks) {
            document.getElementById('launch-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
        }
    });

    // 2. ആരെങ്കിലും ടാപ്പ് ചെയ്യുമ്പോൾ പുതിയ രണ്ട് വരിയുള്ള ബാഡ്ജ് കാണിക്കുന്നു
    db.ref('recent_scratch').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data && data.name) {
            createFloatingBadge(data.name);
        }
    });

    function createFloatingBadge(name) {
        const badge = document.createElement('div');
        badge.className = 'badge';
        
        // പേര് മുകളിലും മെസ്സേജ് താഴെയുമായി സെറ്റ് ചെയ്യുന്നു
        badge.innerHTML = `
            <div class="badge-name">${name}</div>
            <div class="badge-msg">Joined the Launch! 🚀</div>
        `;
        
        // സ്ക്രീനിന്റെ പല ഭാഗത്തായി വരാൻ റാൻഡം എക്സ് പൊസിഷൻ
        const randomX = Math.floor(Math.random() * 65) + 5; // 5% മുതൽ 70% വരെ
        badge.style.left = randomX + '%';
        
        document.body.appendChild(badge);

        // 3.5 സെക്കന്റിന് ശേഷം ബാഡ്ജ് ഡിലീറ്റ് ആകും
        setTimeout(() => {
            badge.remove();
        }, 3500);
    }
</script>
</body>
</html>
