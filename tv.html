<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Display - Dulcedia 2026</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #0f172a; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            text-align: center;
            position: relative;
        }

        #result-screen { 
            display: flex; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            z-index: 1; 
            overflow: hidden; 
            justify-content: center; 
            align-items: center; 
        }
        .poster-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('poster-tv.jpg') center center / cover no-repeat;
            filter: blur(30px) brightness(0.35); 
            transform: scale(1.1); 
            z-index: 1;
        }
        .poster-tv { 
            height: 96vh; 
            max-width: 95vw; 
            object-fit: contain;
            position: relative;
            z-index: 2;
            border-radius: 12px; 
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
            animation: burstIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        #curtain-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10;
            display: flex; overflow: hidden; pointer-events: none;
        }
        .curtain-half {
            position: absolute; top: 0; width: 50vw; height: 100vh; background: #0f172a;
            transition: transform 1.8s cubic-bezier(0.77, 0, 0.175, 1); z-index: 10;
        }
        .curtain-half.left { left: 0; border-right: 1px solid #1e293b; }
        .curtain-half.right { right: 0; border-left: 1px solid #1e293b; }
        
        .curtain-half.left.split { transform: translateX(-100%); }
        .curtain-half.right.split { transform: translateX(100%); }

        .container { 
            width: 90%; max-width: 900px; position: relative; z-index: 20; 
            transition: opacity 0.8s ease;
        }
        .container.fade-out { opacity: 0; }

        .subtitle { color: #f59e0b; letter-spacing: 3px; font-weight: bold; font-size: 24px; margin-bottom: 10px; }
        .title { font-size: 72px; font-weight: 800; margin: 0 0 20px 0; letter-spacing: 2px; }
        .instruction-text { color: #a7f3d0; font-size: 24px; font-weight: 500; margin-bottom: 25px; font-style: italic; letter-spacing: 1px;}

        .progress-container { 
            width: 100%; height: 35px; background: rgba(51, 65, 85, 0.5); 
            border-radius: 20px; overflow: hidden; margin-bottom: 25px;
            border: 2px solid #334155; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .progress-bar { 
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, #ec4899, #3b82f6); 
            transition: width 0.1s linear; border-radius: 20px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
        }
        .percentage-text { font-size: 32px; color: #38bdf8; font-weight: bold; margin-top: 15px; }

        .badge {
            position: absolute; padding: 15px 35px; border-radius: 25px;
            background: linear-gradient(135deg, #f97316, #ea580c); color: white; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            animation: floatUp 4s forwards ease-in-out; 
            opacity: 0; pointer-events: none; border: 2px solid rgba(255,255,255,0.2);
            text-align: center; min-width: 250px; z-index: 30;
        }
        .badge-name { font-size: 34px; font-weight: 800; color: #ffffff; margin-bottom: 4px; }
        .badge-msg { font-size: 22px; font-weight: 600; color: #fef08a; }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.7); opacity: 0; }
            15% { opacity: 1; transform: translateY(70vh) scale(1); }
            60% { opacity: 0.9; }
            100% { transform: translateY(5vh) scale(0.7); opacity: 0; }
        }
        
        @keyframes burstIn {
            0% { transform: scale(0.2); opacity: 0; filter: brightness(3) blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: brightness(1); }
        }

        .flash-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: white; z-index: 100; opacity: 0; pointer-events: none;
        }
        @keyframes flashEffect {
            0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div class="flash-overlay" id="flash"></div>

<div id="result-screen">
    <div class="poster-bg"></div>
    <img src="poster-tv.jpg" class="poster-tv" alt="Official Proclamation Poster">
</div>

<div id="curtain-container">
    <div class="curtain-half left" id="curtain-left"></div>
    <div class="curtain-half right" id="curtain-right"></div>
</div>

<div class="container" id="launch-screen">
    <div class="subtitle">SIDRA ACADEMY</div>
    <div class="title">DULCE DIA 2026</div>
    <div class="instruction-text">Tap and Step into the World of Dulce Dia</div>
    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>
    <!-- ടിവിയിലും കൗണ്ട് ഒഴിവാക്കി ശതമാനം മാത്രം ആക്കി -->
    <div class="percentage-text" id="percentage-label">Preparing for Proclamation... 0.0%</div>
</div>

<script>
    /* global firebase */
    const firebaseConfig = { databaseURL: "https://dulcedia-2026-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const targetClicks = 500;
    let launchStarted = false;
    let lastMilestone = 0; 

    const clickSound = new Audio('tv-click.mp3');

    function playClickSound() {
        try {
            clickSound.currentTime = 0; 
            clickSound.play().catch(e => console.log("Audio blocked", e));
        } catch(e) { console.log("Audio error", e); }
    }

    db.ref('mobile_reveal').set(false);

    db.ref('click_count').on('value', (snapshot) => {
        if(launchStarted) return;

        const clicks = snapshot.val() || 0;
        let percentage = ((clicks / targetClicks) * 100).toFixed(1);
        if(parseFloat(percentage) > 100) percentage = "100.0";

        document.getElementById('bar').style.width = percentage + '%';
        // ടിവിയിലെ ടെക്സ്റ്റ് അപ്ഡേറ്റ് ശതമാനം മാത്രം കാണിക്കുന്നു
        document.getElementById('percentage-label').innerText = `Preparing for Proclamation... ${percentage}%`;

        let currentMilestone = Math.floor(parseFloat(percentage) / 10);
        if(currentMilestone > lastMilestone && currentMilestone <= 10) {
            playClickSound();
            lastMilestone = currentMilestone;
        }

        if(clicks >= targetClicks) {
            launchStarted = true;
            document.getElementById('percentage-label').innerText = `Proclaiming... 🚀`;
            document.getElementById('percentage-label').style.color = '#f43f5e';

            setTimeout(() => {
                document.getElementById('launch-screen').classList.add('fade-out');
                document.getElementById('curtain-left').classList.add('split');
                document.getElementById('curtain-right').classList.add('split');
                document.getElementById('flash').style.animation = 'flashEffect 0.8s ease-out';

                setTimeout(() => {
                    db.ref('mobile_reveal').set(true);
                }, 2000);
            }, 2500);
        }
    });

    db.ref('recent_scratch').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data && data.name && !launchStarted) {
            createFloatingBadge(data.name);
        }
    });

    function createFloatingBadge(name) {
        const badge = document.createElement('div');
        badge.className = 'badge';
        badge.innerHTML = `
            <div class="badge-name">${name}</div>
            <div class="badge-msg">Joined Proclamation! 🚀</div>
        `;
        const randomX = Math.floor(Math.random() * 70) + 5;
        const randomDuration = (Math.random() * 1.5 + 3.5).toFixed(1); 
        
        badge.style.left = randomX + '%';
        badge.style.animationDuration = randomDuration + 's';
        
        document.body.appendChild(badge);
        setTimeout(() => { badge.remove(); }, randomDuration * 1000);
    }
</script>
</body>
</html>
