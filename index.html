<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulcedia 2026 - Launch Portal</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #0f172a; padding: 20px; color: white; margin: 0; }
        .box { background: #1e293b; padding: 35px 25px; border-radius: 24px; display: inline-block; margin-top: 40px; width: 85%; max-width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h2 { color: #fff; margin-bottom: 5px; font-size: 26px; font-weight: 800; }
        h4 { color: #94a3b8; margin-top: 0; font-weight: 500; margin-bottom: 30px; letter-spacing: 1px; }
        input { padding: 14px; font-size: 16px; margin: 15px 0; width: 88%; border: 1px solid #334155; background: #0f172a; color: white; border-radius: 12px; outline: none; text-align: center; }
        .login-btn { padding: 15px; font-size: 16px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; border: none; border-radius: 12px; cursor: pointer; width: 97%; font-weight: bold; box-shadow: 0 4px 12px rgba(29, 78, 216, 0.4); }
        
        #scratch-area { 
            width: 180px; height: 180px; background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white; margin: 30px auto; border-radius: 50%; line-height: 180px; 
            font-size: 24px; font-weight: bold; cursor: pointer; display: none; 
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5); -webkit-tap-highlight-color: transparent;
            user-select: none; transition: transform 0.1s ease;
        }
        #scratch-area:active { transform: scale(0.95); background: linear-gradient(135deg, #db2777, #7c3aed); }
        
        #result-section { display: none; }
        #final-poster { width: 100%; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 20px; }
        
        .action-btn { padding: 12px 20px; font-size: 15px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin: 8px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .whatsapp-btn { background: #25D366; color: white; }
        .download-btn { background: #3b82f6; color: white; }
        
        p { color: #94a3b8; font-size: 15px; line-height: 1.5; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div class="box">
    <div id="login-section">
        <h2>Dulcedia 2026</h2>
        <h4>LAUNCH PORTAL</h4>
        <input type="text" id="parent-name" placeholder="Enter Your Name"><br>
        <button class="login-btn" onclick="startProcess()">CONTINUE</button>
    </div>

    <div id="scratch-section" style="display:none;">
        <h3 style="color: #60a5fa; margin-bottom: 5px;">Ready to Launch!</h3>
        <p>Keep tapping the button below to power up the Proclamation!</p>
        
        <div id="scratch-area" onclick="doScratch()">TAP!</div>
    </div>

    <div id="result-section">
        <h3 style="color: #4ade80; margin-bottom: 15px;">🎉 Officially Launched!</h3>
        <!-- ഗിറ്റ്‌ഹബ്ബിലെ ഫോട്ടോ നേരിട്ട് ലോഡ് ചെയ്യുന്നു -->
        <img id="final-poster" src="poster-mobile.jpg" alt="Poster">
        
        <button class="action-btn whatsapp-btn" onclick="sharePoster()">
            Share Poster via WhatsApp
        </button>
        <button class="action-btn download-btn" onclick="downloadPoster()">
            Save Poster
        </button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://dulcedia-2026-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let pName = "";
    const tapSound = new Audio('click.mp3');

    function startProcess() {
        pName = document.getElementById('parent-name').value.trim();
        if(!pName) return alert("Please enter your name");

        document.getElementById('login-section').style.display = 'none';
        document.getElementById('scratch-section').style.display = 'block';
        document.getElementById('scratch-area').style.display = 'block';
        
        tapSound.play().catch(() => {}); 
        listenToTotalStatus();
    }

    function doScratch() {
        tapSound.currentTime = 0;
        tapSound.play().catch(e => console.log("Audio error:", e));

        db.ref('click_count').transaction((currentClicks) => {
            return (currentClicks || 0) + 1;
        });
        db.ref('recent_scratch').set({ name: pName, time: Date.now() });
    }

    function listenToTotalStatus() {
        db.ref('click_count').on('value', (snapshot) => {
            const clicks = snapshot.val() || 0;
            if(clicks >= 200) {
                document.getElementById('scratch-section').style.display = 'none';
                document.getElementById('result-section').style.display = 'block';
            }
        });
    }

    // വാട്സാപ്പിലേക്ക് ഫോട്ടോ നേരിട്ട് ഷെയർ ചെയ്യാനുള്ള അഡ്വാൻസ്ഡ് ഫങ്ക്ഷൻ
    async function sharePoster() {
        try {
            const response = await fetch('poster-mobile.jpg');
            const blob = await response.blob();
            const file = new File([blob], 'Dulce_Dia_2026_Poster.jpg', { type: blob.type });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({
                    files: [file],
                    title: 'Dulce Dia 2026',
                    text: 'Mining the minds\nDulceDia 2026\nSidra Academy'
                });
            } else {
                // ഫോൺ സപ്പോർട്ട് ചെയ്യുന്നില്ലെങ്കിൽ പഴയ ലിങ്ക് വഴി ഷെയർ ചെയ്യും
                const fallbackUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent("Mining the minds\nDulceDia 2026\nSidra Academy\n\n" + window.location.href)}`;
                window.open(fallbackUrl, '_blank');
            }
        } catch (error) {
            console.log('Sharing failed', error);
        }
    }

    // ഫോട്ടോ മൊബൈലിലേക്ക് നേരിട്ട് സേവ് ചെയ്യാനുള്ള ഫങ്ക്ഷൻ
    async function downloadPoster() {
        try {
            const response = await fetch('poster-mobile.jpg');
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Dulce_Dia_2026_Poster.jpg';
            document.body.appendChild(a);
            a.click();
            
            window.URL.revokeObjectURL(url);
            a.remove();
        } catch (error) {
            console.log('Download failed', error);
        }
    }
</script>
</body>
</html>
