<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulce Dia 2026 - Mobile Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(30, 41, 59, 0.7);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        .title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #38bdf8, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 14px;
            color: #38bdf8;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        input[type="text"]:focus {
            border-color: #38bdf8;
            outline: none;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .tap-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ec4899, #3b82f6);
            color: white;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.4);
            transition: transform 0.1s, box-shadow 0.3s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            margin: 20px 0;
        }
        .tap-btn:active {
            transform: scale(0.92);
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.6);
        }

        /* 📊 ടാപ്പ് കീക്ക് താഴെ ശതമാനം മാത്രം */
        #mobile-percentage-label {
            font-size: 24px;
            color: #38bdf8;
            font-weight: bold;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }

        #reveal-screen {
            display: none;
        }
        
        /* 📉 പോസ്റ്ററിന്റെ സൈസ് കുറച്ചു */
        .poster-mobile {
            width: 65%;
            max-width: 240px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        /* 💾 സേവ് ബട്ടൺ സ്റ്റൈൽ */
        .download-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin-bottom: 12px;
            width: 100%;
            box-sizing: border-box;
        }

        .share-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
        }
        
        .download-btn:active, .share-btn:active {
            transform: scale(0.98);
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div class="container">
    
    <!-- 1️⃣ ടാപ്പിങ് സെക്ഷൻ -->
    <div id="scratch-section">
        <h1 class="title">Ready for Proclamation!</h1>
        <p class="subtitle">Tap and Step into the World of Dulce Dia</p>
        
        <div class="input-group">
            <label for="user-name">ENTER YOUR NAME</label>
            <input type="text" id="user-name" placeholder="Type your name here..." maxlength="20">
        </div>

        <button class="tap-btn" onclick="handleTap()">TAP HERE</button>

        <!-- കൗണ്ട് ഒഴിവാക്കി ശതമാനം മാത്രം കാണിക്കുന്നു -->
        <div id="mobile-percentage-label">0.0%</div>
    </div>

    <!-- 2️⃣ റിസീൽ സെക്ഷൻ -->
    <div id="reveal-screen">
        <h1 class="title" style="font-size: 24px;">Proclamation Revealed! 🎉</h1>
        <p class="subtitle">Official Poster is now live on the Big Screen.</p>
        
        <img src="poster-mobile.jpg" class="poster-mobile" alt="Dulce Dia Poster">
        
        <!-- 💾 പോസ്റ്റർ സേവ് ചെയ്യാനുള്ള പുതിയ ബട്ടൺ -->
        <a href="poster-mobile.jpg" download="Dulce_Dia_Poster.jpg" class="download-btn">
            📥 Save Poster to Phone
        </a>

        <button class="share-btn" onclick="shareOnWhatsApp()">
            Share Text on WhatsApp
        </button>
    </div>

</div>

<script>
    /* global firebase */
    const firebaseConfig = { databaseURL: "https://dulcedia-2026-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const targetClicks = 500;

    // 🎵 മൊബൈലിൽ ടാപ്പ് ചെയ്യുമ്പോൾ കൃത്യമായി പ്ലേ ആകുന്ന ഇൻസ്റ്റന്റ് സൗണ്ട്
    function playTapSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        } catch(e) { console.log("Audio error", e); }
    }

    function handleTap() {
        playTapSound(); // സൗണ്ട് പ്ലേ ചെയ്യുന്നു
        
        let nameInput = document.getElementById('user-name').value.trim();
        if(nameInput === "") { nameInput = "Someone"; }

        db.ref('click_count').transaction((currentClicks) => {
            return (currentClicks || 0) + 1;
        });

        db.ref('recent_scratch').set({
            name: nameInput,
            time: Date.now()
        });
    }

    db.ref('click_count').on('value', (snapshot) => {
        const clicks = snapshot.val() || 0;
        let percentage = ((clicks / targetClicks) * 100).toFixed(1);
        if(parseFloat(percentage) > 100) percentage = "100.0";
        
        const mobileLabel = document.getElementById('mobile-percentage-label');
        if(mobileLabel) {
            mobileLabel.innerText = percentage + "%";
        }
    });

    db.ref('mobile_reveal').on('value', (snapshot) => {
        const isRevealed = snapshot.val() || false;
        if(isRevealed) {
            document.getElementById('scratch-section').style.display = 'none';
            document.getElementById('reveal-screen').style.display = 'block';
        }
    });

    function shareOnWhatsApp() {
        const shareText = `✨ DULCE DIA: Mining the Minds ✨

📣 Unearthing potential, shaping perspectives, and celebrating brilliance…

The stage is set for a grand exploration of talent, intellect, and creativity. Get ready to witness a spectacular three-day journey where bright minds converge to challenge limits, showcase innovations, and ignite fresh ideas.

🗓️ 17, 18, 19 September 2026

📍 Darul Aman, Nadukani (Al Maqar Campus, Taliparamba)

*SIDRA ACADEMY*`;

        const whatsappUrl = "https://api.whatsapp.com/send?text=" + encodeURIComponent(shareText);
        window.open(whatsappUrl, '_blank');
    }
</script>
</body>
</html>
