<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulce Dia 2026 - Mobile Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(30, 41, 59, 0.7);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        .title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #38bdf8, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* പേര് ടൈപ്പ് ചെയ്യുന്ന ബോക്സ് */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 14px;
            color: #38bdf8;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        input[type="text"]:focus {
            border-color: #38bdf8;
            outline: none;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        /* ⚡ പ്രധാന ടാപ്പ് ബട്ടൺ */
        .tap-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ec4899, #3b82f6);
            color: white;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.4);
            transition: transform 0.1s, box-shadow 0.3s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            margin: 20px 0;
        }
        .tap-btn:active {
            transform: scale(0.92);
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.6);
        }

        /* 📊 ടാപ്പ് ബട്ടണിന് താഴെയുള്ള ശതമാനം */
        #mobile-percentage-label {
            font-size: 20px;
            color: #38bdf8;
            font-weight: bold;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }

        /* 🎉 പ്രൊക്ലമേഷൻ കഴിഞ്ഞുള്ള സ്ക്രീൻ (പൂർണ്ണമായി തുറന്നു കഴിഞ്ഞാൽ) */
        #reveal-screen {
            display: none;
        }
        .poster-mobile {
            width: 100%;
            max-width: 320px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }
        .share-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        .share-btn:active {
            transform: scale(0.98);
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div class="container">
    
    <!-- 1️⃣ ടാപ്പിങ് സെക്ഷൻ (തുടക്കത്തിൽ ഇത് കാണിക്കും) -->
    <div id="scratch-section">
        <h1 class="title">Ready for Proclamation!</h1>
        <p class="subtitle">Tap and Step into the World of Dulce Dia</p>
        
        <div class="input-group">
            <label for="user-name">ENTER YOUR NAME</label>
            <input type="text" id="user-name" placeholder="Type your name here..." maxlength="20">
        </div>

        <button class="tap-btn" onclick="handleTap()">TAP HERE</button>

        <!-- ടാപ്പ് കീക്ക് താഴെയുള്ള ശതമാനം ലേബൽ -->
        <div id="mobile-percentage-label">0.0% (0/500 Taps)</div>
    </div>

    <!-- 2️⃣ റിസീൽ സെക്ഷൻ (100% ആയി ടിവി തുറന്നു കഴിഞ്ഞാൽ ഇത് കാണിക്കും) -->
    <div id="reveal-screen">
        <h1 class="title" style="font-size: 24px;">Proclamation Revealed! 🎉</h1>
        <p class="subtitle">Official Poster is now live on the Big Screen.</p>
        
        <!-- നിങ്ങളുടെ മൊബൈൽ പോസ്റ്റർ ഇമേജ് പേര് ഇവിടെ നൽകാം -->
        <img src="poster-mobile.jpg" class="poster-mobile" alt="Dulce Dia Poster">
        
        <button class="share-btn" onclick="shareOnWhatsApp()">
            Share on WhatsApp
        </button>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://dulcedia-2026-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const targetClicks = 500;

    // 📱 ടാപ്പ് ചെയ്യുമ്പോൾ ഫയർബേസിലേക്ക് ഡാറ്റ വിടുന്നു
    function handleTap() {
        let nameInput = document.getElementById('user-name').value.trim();
        if(nameInput === "") {
            nameInput = "Someone"; // പേര് നൽകിയില്ലെങ്കിൽ കാണിക്കേണ്ട ഡിഫോൾട്ട് പേര്
        }

        // 1. ക്ലിക്ക് കൗണ്ട് 1 വെച്ച് കൂട്ടുന്നു (സുരക്ഷിതമായ ട്രാൻസാക്ഷൻ രീതിയിൽ)
        db.ref('click_count').transaction((currentClicks) => {
            return (currentClicks || 0) + 1;
        });

        // 2. ടിവിയിൽ പേര് ഫ്ലോട്ട് ചെയ്യാൻ വേണ്ടി ഡാറ്റ അപ്ഡേറ്റ് ചെയ്യുന്നു
        db.ref('recent_scratch').set({
            name: nameInput,
            time: Date.now()
        });
    }

    // 📊 തത്സമയം ശതമാനവും കൗണ്ടും അപ്ഡേറ്റ് ചെയ്യുന്നു
    db.ref('click_count').on('value', (snapshot) => {
        const clicks = snapshot.val() || 0;
        
        let percentage = ((clicks / targetClicks) * 100).toFixed(1);
        if(parseFloat(percentage) > 100) percentage = "100.0";
        
        const mobileLabel = document.getElementById('mobile-percentage-label');
        if(mobileLabel) {
            mobileLabel.innerText = `${percentage}% (${clicks}/${targetClicks} Taps)`;
        }
    });

    // 🚪 ടിവിയിൽ ലോഡിങ് കഴിഞ്ഞ് വാതിൽ തുറക്കുമ്പോൾ മൊബൈൽ സ്ക്രീൻ മാറ്റുന്നു
    db.ref('mobile_reveal').on('value', (snapshot) => {
        const isRevealed = snapshot.val() || false;
        if(isRevealed) {
            document.getElementById('scratch-section').style.display = 'none';
            document.getElementById('reveal-screen').style.display = 'block';
        }
    });

    // 📣 വാട്സാപ്പിലേക്ക് നിങ്ങൾ തന്ന പുതിയ ഫോർമാറ്റിൽ മെസ്സേജ് അയക്കുന്നു
    function shareOnWhatsApp() {
        const shareText = `✨ DULCE DIA: Mining the Minds ✨

📣 Unearthing potential, shaping perspectives, and celebrating brilliance…

The stage is set for a grand exploration of talent, intellect, and creativity. Get ready to witness a spectacular three-day journey where bright minds converge to challenge limits, showcase innovations, and ignite fresh ideas.

🗓️ 17, 18, 19 September 2026

📍 Darul Aman, Nadukani (Al Maqar Campus, Taliparamba)

*SIDRA ACADEMY*`;

        const whatsappUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`;
        window.open(whatsappUrl, '_blank');
    }
</script>
</body>
</html>
